name: Deploy Lambda Worker

env:
  AWS_REGION: eu-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda bundle
        run: npm run build:lambda

      - name: Package Lambda artifact
        run: |
          cd dist/lambda
          zip -r ../../lambda-sync-fuel-data.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://lambda-sync-fuel-data.zip

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --environment "Variables={DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},FUEL_FINDER_CLIENT_ID=${{ secrets.FUEL_FINDER_CLIENT_ID }},FUEL_FINDER_CLIENT_SECRET=${{ secrets.FUEL_FINDER_CLIENT_SECRET }}}"
